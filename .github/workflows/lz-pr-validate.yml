name: LZ – PR Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: lz-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TF_WORKING_DIR: terraform/environments/landing-zone

jobs:
  # ── Corporate runner: checkout and package source ──────────
  fetch-source:
    runs-on: [self-hosted, aks]
    outputs:
      artifact-name: ${{ steps.pkg.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: pkg
        shell: bash
        run: |
          echo "artifact-name=lz-source-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          tar --exclude='.git' --exclude='**/.terraform' --exclude='**/*.tfstate*' \
              -czf /tmp/lz-source.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact-name }}
          path: /tmp/lz-source.tar.gz
          retention-days: 1
          if-no-files-found: error

  # ── Cloud runner: static analysis (no cloud creds needed) ──
  static-analysis:
    needs: fetch-source
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.fetch-source.outputs.artifact-name }}
      - run: tar -xzf lz-source.tar.gz

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"
          terraform_wrapper: false

      - name: Format check
        run: terraform fmt -check -recursive terraform/
        continue-on-error: true

      - name: Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -backend=false
          terraform validate -no-color

  # ── Cloud runner: plan against real state (OIDC auth) ──────
  plan:
    needs: [fetch-source, static-analysis]
    runs-on: ubuntu-22.04
    environment: lz-plan
    steps:
      - uses: ./.github/actions/tf-init
        with:
          artifact-name: ${{ needs.fetch-source.outputs.artifact-name }}
          session-name: gh-lz-plan-pr${{ github.event.pull_request.number }}
          working-dir: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -var-file=landing-zone.tfvars -out=tfplan -no-color \
            2>&1 | tee plan-output.txt

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-pr${{ github.event.pull_request.number }}-${{ github.sha }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan-output.txt
          retention-days: 5

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan-output.txt', 'utf8').slice(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${out}\n\`\`\`\n</details>`,
            });
