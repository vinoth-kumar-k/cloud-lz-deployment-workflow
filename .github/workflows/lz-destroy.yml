# -----------------------------------------------------------
# Workflow: Landing Zone – Emergency Destroy
#
# DESTRUCTIVE – tears down the entire landing zone.
# Hard-gated by:
#   1. Manual workflow_dispatch only (no push/PR trigger)
#   2. Confirmation string "DESTROY-LANDING-ZONE" required
#   3. GitHub Environment "lz-destroy" with required reviewers
#   4. Restricted to protected branches only
#
# Use with extreme caution.  This workflow should be
# triggered only for complete environment decommission or
# disaster recovery exercises in non-production accounts.
# -----------------------------------------------------------
name: LZ – Destroy (Emergency)

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type 'DESTROY-LANDING-ZONE' to confirm destruction"
        required: true
      reason:
        description: "Reason for destroying the landing zone (audit trail)"
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: lz-destroy
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.5"
  ALICLOUD_REGION: ${{ vars.ALICLOUD_REGION }}
  TF_WORKING_DIR: terraform/environments/landing-zone

jobs:
  validate-confirmation:
    name: Validate Destroy Confirmation
    runs-on: [self-hosted, cloud]

    steps:
      - name: Check confirmation string
        run: |
          if [[ "${{ inputs.confirmation }}" != "DESTROY-LANDING-ZONE" ]]; then
            echo "::error::Confirmation string does not match. Aborting."
            exit 1
          fi
          echo "Confirmation accepted. Reason: ${{ inputs.reason }}"

  fetch-source:
    name: Fetch Source (corporate runner)
    needs: validate-confirmation
    runs-on: [self-hosted, corporate]
    outputs:
      artifact-name: ${{ steps.set-artifact.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set artifact name
        id: set-artifact
        run: |
          echo "name=lz-source-destroy-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Package source
        run: |
          tar --exclude='.git' \
              --exclude='**/.terraform' \
              --exclude='**/*.tfstate*' \
              -czf /tmp/lz-source.tar.gz .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact.outputs.name }}
          path: /tmp/lz-source.tar.gz
          retention-days: 1

  plan-destroy:
    name: Plan Destroy
    needs: fetch-source
    runs-on: [self-hosted, cloud]
    outputs:
      plan-artifact: ${{ steps.set-plan-artifact.outputs.name }}

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.fetch-source.outputs.artifact-name }}

      - name: Extract source
        run: tar -xzf lz-source.tar.gz

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure Alibaba Cloud credentials (OIDC)
        uses: aliyun/alibaba-cloud-setup-credentials@v1
        with:
          role-to-assume: ${{ vars.ALICLOUD_OIDC_ROLE_ARN }}
          oidc-provider-arn: ${{ vars.ALICLOUD_OIDC_PROVIDER_ARN }}
          role-session-name: gh-lz-destroy-plan-${{ github.run_id }}
          role-duration-seconds: 3600

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=landing-zone/terraform.tfstate" \
            -backend-config="region=${{ env.ALICLOUD_REGION }}" \
            -backend-config="tablestore_endpoint=${{ vars.TF_LOCK_TABLESTORE_ENDPOINT }}" \
            -backend-config="tablestore_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Terraform Plan (destroy)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=landing-zone.tfvars \
            -destroy \
            -out=tfplan \
            -no-color \
            2>&1 | tee destroy-plan-output.txt

      - name: Set plan artifact name
        id: set-plan-artifact
        run: |
          echo "name=tfplan-destroy-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Upload destroy plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-plan-artifact.outputs.name }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/destroy-plan-output.txt
          retention-days: 5

  # Gate: requires explicit approval in GitHub Environment "lz-destroy"
  await-destroy-approval:
    name: Await Destroy Approval (Human Gate)
    needs: plan-destroy
    runs-on: [self-hosted, cloud]
    environment: lz-destroy

    steps:
      - name: Destruction approved
        run: |
          echo "Destruction of landing zone approved."
          echo "Reason on record: ${{ inputs.reason }}"
          echo "Approver: check environment deployment log for approver identity."

  execute-destroy:
    name: Execute Destroy
    needs: [fetch-source, plan-destroy, await-destroy-approval]
    runs-on: [self-hosted, cloud]

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.fetch-source.outputs.artifact-name }}

      - name: Extract source
        run: tar -xzf lz-source.tar.gz

      - name: Download destroy plan artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.plan-destroy.outputs.plan-artifact }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure Alibaba Cloud credentials (OIDC)
        uses: aliyun/alibaba-cloud-setup-credentials@v1
        with:
          role-to-assume: ${{ vars.ALICLOUD_OIDC_ROLE_ARN }}
          oidc-provider-arn: ${{ vars.ALICLOUD_OIDC_PROVIDER_ARN }}
          role-session-name: gh-lz-destroy-apply-${{ github.run_id }}
          role-duration-seconds: 7200

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=landing-zone/terraform.tfstate" \
            -backend-config="region=${{ env.ALICLOUD_REGION }}" \
            -backend-config="tablestore_endpoint=${{ vars.TF_LOCK_TABLESTORE_ENDPOINT }}" \
            -backend-config="tablestore_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -no-color -auto-approve tfplan \
            2>&1 | tee destroy-output.txt

      - name: Upload destroy log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: destroy-log-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/destroy-output.txt
          retention-days: 90
