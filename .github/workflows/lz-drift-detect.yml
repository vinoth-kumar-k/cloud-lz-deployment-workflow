name: LZ – Drift Detection

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

env:
  TF_WORKING_DIR: terraform/environments/landing-zone

jobs:
  # ── Corporate runner: checkout and package source ──────────
  fetch-source:
    runs-on: [self-hosted, corporate]
    outputs:
      artifact-name: ${{ steps.pkg.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v4

      - id: pkg
        shell: bash
        run: |
          echo "artifact-name=lz-source-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          tar --exclude='.git' --exclude='**/.terraform' --exclude='**/*.tfstate*' \
              -czf /tmp/lz-source.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact-name }}
          path: /tmp/lz-source.tar.gz
          retention-days: 1

  # ── Cloud runner: plan in check mode ───────────────────────
  drift-check:
    needs: fetch-source
    runs-on: [self-hosted, cloud]
    outputs:
      drift-detected: ${{ steps.plan.outputs.drift-detected }}
      drift-summary: ${{ steps.plan.outputs.drift-summary }}
    steps:
      - uses: ./.github/actions/tf-init
        with:
          artifact-name: ${{ needs.fetch-source.outputs.artifact-name }}
          session-name: gh-lz-drift-${{ github.run_id }}
          working-dir: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan (drift check)
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          terraform plan -var-file=landing-zone.tfvars -detailed-exitcode -no-color \
            2>&1 | tee plan-output.txt
          EC=${PIPESTATUS[0]}
          set -e

          if [[ $EC -eq 2 ]]; then
            echo "drift-detected=true" >> "$GITHUB_OUTPUT"
            SUMMARY=$(grep -E "^Plan:|to add|to change|to destroy" plan-output.txt | head -5 | tr '\n' ' ')
            echo "drift-summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
          elif [[ $EC -eq 0 ]]; then
            echo "drift-detected=false" >> "$GITHUB_OUTPUT"
            echo "drift-summary=No changes" >> "$GITHUB_OUTPUT"
          else
            echo "drift-detected=true" >> "$GITHUB_OUTPUT"
            echo "drift-summary=Plan failed – manual investigation required" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-report-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/plan-output.txt
          retention-days: 14

  # ── Create or update a GitHub Issue on drift ───────────────
  alert:
    needs: drift-check
    if: needs.drift-check.outputs.drift-detected == 'true'
    runs-on: [self-hosted, cloud]
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const run_url = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = [
              '## Landing Zone Drift Detected',
              `**Run:** [#${{ github.run_id }}](${run_url})`,
              `**Summary:** ${{ needs.drift-check.outputs.drift-summary }}`,
              '',
              '1. Review the drift report artifact in the run above.',
              '2. Determine if the change is intentional (update IaC) or accidental (re-deploy).',
            ].join('\n');

            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'drift-alert',
            });

            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: 'Landing Zone – Infrastructure Drift Detected',
                body, labels: ['drift-alert', 'infrastructure'],
              });
            }
