# -----------------------------------------------------------
# Workflow: Landing Zone – Drift Detection
#
# Scheduled daily.  Runs terraform plan in check mode and
# alerts the team if actual cloud state diverges from IaC.
#
# Raises a GitHub Issue if drift is detected so that the
# team can investigate before the next planned deployment.
# -----------------------------------------------------------
name: LZ – Drift Detection

on:
  schedule:
    - cron: "0 4 * * *"     # 04:00 UTC daily
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: read
  id-token: write
  issues: write

env:
  TF_VERSION: "1.9.5"
  ALICLOUD_REGION: ${{ vars.ALICLOUD_REGION }}
  TF_WORKING_DIR: terraform/environments/landing-zone

jobs:
  fetch-source:
    name: Fetch Source (corporate runner)
    runs-on: [self-hosted, corporate]
    outputs:
      artifact-name: ${{ steps.set-artifact.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set artifact name
        id: set-artifact
        run: |
          echo "name=lz-source-drift-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Package source
        run: |
          tar --exclude='.git' \
              --exclude='**/.terraform' \
              --exclude='**/*.tfstate*' \
              -czf /tmp/lz-source.tar.gz .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact.outputs.name }}
          path: /tmp/lz-source.tar.gz
          retention-days: 1

  drift-check:
    name: Drift Check
    needs: fetch-source
    runs-on: [self-hosted, cloud]
    outputs:
      drift-detected: ${{ steps.plan.outputs.drift-detected }}
      drift-summary: ${{ steps.plan.outputs.drift-summary }}

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.fetch-source.outputs.artifact-name }}

      - name: Extract source
        run: tar -xzf lz-source.tar.gz

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure Alibaba Cloud credentials (OIDC)
        uses: aliyun/alibaba-cloud-setup-credentials@v1
        with:
          role-to-assume: ${{ vars.ALICLOUD_OIDC_ROLE_ARN }}
          oidc-provider-arn: ${{ vars.ALICLOUD_OIDC_PROVIDER_ARN }}
          role-session-name: gh-lz-drift-${{ github.run_id }}
          role-duration-seconds: 3600

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=landing-zone/terraform.tfstate" \
            -backend-config="region=${{ env.ALICLOUD_REGION }}" \
            -backend-config="tablestore_endpoint=${{ vars.TF_LOCK_TABLESTORE_ENDPOINT }}" \
            -backend-config="tablestore_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Terraform Plan (drift detection)
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          terraform plan \
            -var-file=landing-zone.tfvars \
            -detailed-exitcode \
            -no-color \
            2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          if [[ $EXIT_CODE -eq 2 ]]; then
            echo "drift-detected=true" >> "$GITHUB_OUTPUT"
            SUMMARY=$(grep -E "^Plan:|to add|to change|to destroy" plan-output.txt | head -5 | tr '\n' ' ')
            echo "drift-summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
            echo "::warning::Infrastructure drift detected!"
          elif [[ $EXIT_CODE -eq 0 ]]; then
            echo "drift-detected=false" >> "$GITHUB_OUTPUT"
            echo "drift-summary=No changes detected" >> "$GITHUB_OUTPUT"
            echo "No drift detected – state is consistent."
          else
            echo "drift-detected=true" >> "$GITHUB_OUTPUT"
            echo "drift-summary=Plan failed – manual investigation required" >> "$GITHUB_OUTPUT"
            echo "::error::Terraform plan failed during drift check"
          fi

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-report-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/plan-output.txt
          retention-days: 14

  alert:
    name: Raise Drift Alert
    needs: drift-check
    if: needs.drift-check.outputs.drift-detected == 'true'
    runs-on: [self-hosted, cloud]

    steps:
      - name: Create or update drift issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '⚠️ Landing Zone Infrastructure Drift Detected';
            const body = [
              '## Infrastructure Drift Detected',
              '',
              `**Detection run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `**Detected at:** ${new Date().toISOString()}`,
              '',
              '### Summary',
              '```',
              `${{ needs.drift-check.outputs.drift-summary }}`,
              '```',
              '',
              '### Required Actions',
              '1. Review the [drift report artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for full details.',
              '2. Determine if drift was intentional (and update IaC) or accidental (and re-deploy).',
              '3. Run the deploy workflow to reconcile if needed.',
              '',
              '> This issue was auto-created by the drift detection workflow.',
            ].join('\n');

            // Search for existing open drift issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift-alert',
            });

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `### Drift still present – ${{ github.run_id }}\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['drift-alert', 'infrastructure'],
              });
            }
